<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Products</title>
    <style>
        body {
            font-family: 'Gabriola', serif;
            background-color: #FFFFFF;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* Шапка с логотипом */
        .header {
            display: flex;
            align-items: center;
            background-color: #BBD9B2;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .logo {
            height: 60px;
            width: auto;
            margin-right: 20px;
        }

        .header h1 {
            color: #2D6033;
            font-size: 2.2em;
            margin: 0;
        }

        /* Заголовки разделов */
        h2, h3 {
            color: #2D6033;
            font-size: 1.8em;
            margin-top: 25px;
            margin-bottom: 15px;
        }

        /* Таблица */
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #FFFFFF;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        th {
            background-color: #BBD9B2;
            color: #2D6033;
            font-size: 1.2em;
            padding: 12px 8px;
            text-align: left;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #BBD9B2;
        }

        tbody tr:hover {
            background-color: #f0f7ee;
        }

        /* Поля ввода и select */
        input, select {
            font-family: 'Gabriola', serif;
            font-size: 1.1em;
            padding: 8px 12px;
            border: 1px solid #BBD9B2;
            border-radius: 5px;
            width: 300px;
            max-width: 100%;
            margin-bottom: 10px;
            box-sizing: border-box;
        }

            input:focus, select:focus {
                outline: none;
                border-color: #2D6033;
                box-shadow: 0 0 5px rgba(45,96,51,0.3);
            }

        /* Кнопки */
        button {
            font-family: 'Gabriola', serif;
            font-size: 1.1em;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #2D6033;
            color: white;
            transition: background-color 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

            button:hover {
                background-color: #1e4422;
            }

        /* Специально для кнопок действий в таблице (если будут) */
        .action-btn {
            background-color: #BBD9B2;
            color: #2D6033;
            margin-right: 5px;
            padding: 5px 10px;
        }

            .action-btn:hover {
                background-color: #a8c69f;
            }

        /* Горизонтальный разделитель */
        hr {
            border: none;
            height: 2px;
            background-color: #BBD9B2;
            margin: 30px 0;
        }

        /* Контейнер для полей */
        .form-group {
            margin-bottom: 10px;
        }

        /* Для inline-блоков (если нужно) */
        .inline {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

    <h2>Products</h2> 
    
    <button onclick="loadProducts()">Load Products</button>

    <table border="1">
        <thead>
            <tr>
                <th>Id</th>
                <th>Type</th>
                <th>Name</th>
                <th>Articul</th>
                <th>Price</th>
                <th>Width</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="productsTable"></tbody>
    </table>

    <hr>

    <h3>Add / Edit Product</h3>

    <input id="id" type="number" placeholder="Id (for update)">
    <br>

    <input id="typeproduct" placeholder="Type">
    <br>

    <input id="name" placeholder="Name">
    <br>

    <input id="articul" placeholder="Articul">
    <br>

    <input id="prise" placeholder="Price">
    <br>

    <input id="width" placeholder="Width">
    <br><br>

    <button onclick="addProduct()">Add</button>
    <button onclick="updateProduct()">Update</button>

    <hr>

    <input id="deleteId" placeholder="Id to delete">
    <button onclick="deleteProduct()">Delete</button>

    <script>

        const api = "https://localhost:7011/api/product";

        async function loadProducts() {

            const response = await fetch(api + "/get");
            const data = await response.json();

            let rows = "";

            data.forEach(p => {

                rows += `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.typeproduct}</td>
                    <td>${p.name}</td>
                    <td>${p.articul}</td>
                    <td>${p.prise}</td>
                    <td>${p.width}</td>
                    <td>
                        <button onclick="editProduct(${p.id})">Edit</button>
                    </td>
                </tr>
                `;

            });

            document.getElementById("productsTable").innerHTML = rows;
        }

        async function addProduct() {

            const product = {

                typeproduct: document.getElementById("typeproduct").value,
                name: document.getElementById("name").value,
                articul: parseInt(document.getElementById("articul").value),
                prise: parseInt(document.getElementById("prise").value),
                width: parseInt(document.getElementById("width").value)

            };

            await fetch(api + "/Post", {

                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(product)

            });

            loadProducts();
        }

        async function updateProduct() {

            const id = document.getElementById("id").value;

            const product = {

                id: parseInt(id),
                typeproduct: document.getElementById("typeproduct").value,
                name: document.getElementById("name").value,
                articul: parseInt(document.getElementById("articul").value),
                prise: parseInt(document.getElementById("prise").value),
                width: parseInt(document.getElementById("width").value)

            };

            await fetch(api + "/Put/" + id, {

                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(product)

            });

            loadProducts();
        }

        async function deleteProduct() {

            const id = document.getElementById("deleteId").value;

            await fetch(api + "/Delete/" + id, {
                method: "DELETE"
            });

            loadProducts();
        }

        async function editProduct(id) {

            const response = await fetch(api + "/Getid/" + id);
            const p = await response.json();

            document.getElementById("id").value = p.id;
            document.getElementById("typeproduct").value = p.typeproduct;
            document.getElementById("name").value = p.name;
            document.getElementById("articul").value = p.articul;
            document.getElementById("prise").value = p.prise;
            document.getElementById("width").value = p.width;
        }

        loadProducts();

    </script>

</body>
</html>
