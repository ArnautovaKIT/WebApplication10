<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Materials</title>
    <style>
        body {
            font-family: 'Gabriola', serif;
            background-color: #FFFFFF;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        header {
            display: flex;
            align-items: center;
            background-color: #BBD9B2;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .logo {
            height: 60px;
            width: auto;
            margin-right: 20px;
        }

        header h1 {
            color: #2D6033;
            font-size: 2.2em;
            margin: 0;
        }

        h2, h3 {
            color: #2D6033;
            margin-top: 20px;
            margin-bottom: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #FFFFFF;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        th {
            background-color: #BBD9B2;
            color: #2D6033;
            font-size: 1.2em;
            padding: 12px 8px;
            text-align: left;
        }

        td {
            padding: 10px 8px;
            border-bottom: 1px solid #BBD9B2;
        }

        tbody tr:hover {
            background-color: #f0f7ee;
        }

        button {
            font-family: 'Gabriola', serif;
            font-size: 1.1em;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #2D6033;
            color: white;
            transition: background-color 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

            button:hover {
                background-color: #1e4422;
            }

            button.secondary {
                background-color: #BBD9B2;
                color: #2D6033;
            }

                button.secondary:hover {
                    background-color: #a8c69f;
                }

            button.delete-btn {
                background-color: #dc3545;
            }

                button.delete-btn:hover {
                    background-color: #c82333;
                }

        input {
            padding: 8px 12px;
            border: 1px solid #BBD9B2;
            border-radius: 5px;
            font-family: 'Gabriola', serif;
            font-size: 1.1em;
            margin-right: 10px;
            margin-bottom: 10px;
            width: 150px;
        }

            input:focus {
                outline: none;
                border-color: #2D6033;
                box-shadow: 0 0 5px rgba(45,96,51,0.3);
            }

        .inputs {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        hr {
            border: 1px solid #BBD9B2;
            margin: 30px 0;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

            .message.success {
                display: block;
                background-color: #d4edda;
                color: #155724;
                border: 1px solid #c3e6cb;
            }

            .message.error {
                display: block;
                background-color: #f8d7da;
                color: #721c24;
                border: 1px solid #f5c6cb;
            }
    </style>
</head>

<body>

    <h2>Materials</h2>

    <button onclick="loadMaterials()">Load Materials</button>

    <table border="1">
        <thead>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Min</th>
                <th>Package</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="materialsTable"></tbody>
    </table>

    <hr>

    <h3>Add / Edit Material</h3>

    <input id="id" placeholder="Id (for update)">
    <br>

    <input id="name" placeholder="Name">
    <br>

    <input id="price" placeholder="Price">
    <br>

    <input id="quantity" placeholder="Quantity">
    <br>

    <input id="min" placeholder="Min quantity">
    <br>

    <input id="package" placeholder="Package">
    <br>

    <input id="MaterId" placeholder="MaterId">
    <br>

    <input id="MaterialtypeimportId" placeholder="MaterialTypeId">
    <br>

    <input id="ProductmaterialsimportId" placeholder="ProductMaterialId">
    <br><br>

    <button onclick="addMaterial()">Add</button>
    <button onclick="updateMaterial()">Update</button>

    <hr>

    <input id="deleteId" placeholder="Id to delete">
    <button onclick="deleteMaterial()">Delete</button>

    <script>

        const api = "https://localhost:7026/api/Materialsimport";

        async function loadMaterials() {

            const response = await fetch(api);
            const data = await response.json();

            let rows = "";

            data.forEach(m => {

                rows += `
                <tr>
                    <td>${m.id}</td>
                    <td>${m.name}</td>
                    <td>${m.price}</td>
                    <td>${m.quantity}</td>
                    <td>${m.min}</td>
                    <td>${m.package}</td>
                    <td>
                        <button onclick="editMaterial(${m.id})">Edit</button>
                    </td>
                </tr>
                `;
            });

            document.getElementById("materialsTable").innerHTML = rows;
        }

        async function addMaterial() {

            const material = {

                name: document.getElementById("name").value,
                price: parseInt(document.getElementById("price").value),
                quantity: parseInt(document.getElementById("quantity").value),
                min: parseInt(document.getElementById("min").value),
                package: parseInt(document.getElementById("package").value),
                materId: parseInt(document.getElementById("MaterId").value),
                materialtypeimportId: parseInt(document.getElementById("MaterialtypeimportId").value),
                productmaterialsimportId: parseInt(document.getElementById("ProductmaterialsimportId").value)

            };

            await fetch(api, {

                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(material)

            });

            loadMaterials();
        }

        async function updateMaterial() {

            const id = document.getElementById("id").value;

            const material = {

                id: parseInt(id),
                name: document.getElementById("name").value,
                price: parseInt(document.getElementById("price").value),
                quantity: parseInt(document.getElementById("quantity").value),
                min: parseInt(document.getElementById("min").value),
                package: parseInt(document.getElementById("package").value),
                materId: parseInt(document.getElementById("MaterId").value),
                materialtypeimportId: parseInt(document.getElementById("MaterialtypeimportId").value),
                productmaterialsimportId: parseInt(document.getElementById("ProductmaterialsimportId").value)

            };

            await fetch(api + "/" + id, {

                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(material)

            });

            loadMaterials();
        }

        async function deleteMaterial() {

            const id = document.getElementById("deleteId").value;

            await fetch(api + "/" + id, {
                method: "DELETE"
            });

            loadMaterials();
        }

        async function editMaterial(id) {

            const response = await fetch(api + "/" + id);
            const m = await response.json();

            document.getElementById("id").value = m.id;
            document.getElementById("name").value = m.name;
            document.getElementById("price").value = m.price;
            document.getElementById("quantity").value = m.quantity;
            document.getElementById("min").value = m.min;
            document.getElementById("package").value = m.package;
            document.getElementById("MaterId").value = m.materId;
            document.getElementById("MaterialtypeimportId").value = m.materialtypeimportId;
            document.getElementById("ProductmaterialsimportId").value = m.productmaterialsimportId;
        }

        loadMaterials();

    </script>

</body>
</html>
